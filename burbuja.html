<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Burbuja Multidimensional - ODViz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; height: 100vh; font-family: sans-serif; }
    #split { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
    #svg-panel { flex: 1; background: white; display: flex; justify-content: center; align-items: center; overflow: auto; position: relative; }
    #svg-panel object { width: 100%; height: 100%; display: block; }
    #table-panel { flex: 1; background: #f5f5f5; padding: 15px; overflow: auto; }
    .gutter.gutter-vertical { background: #4a90e2; cursor: row-resize; height: 6px !important; }
  </style>
  <link rel="stylesheet" href="simple-table.css" />
  <script src="https://cdn.jsdelivr.net/npm/split.js@1.6.5/dist/split.min.js"></script>
  <script src="simple-table.js"></script>
</head>
<body>
  <div id="split">
    <div id="svg-panel">
      <object id="svg-object" type="image/svg+xml" data="burbuja_multidimensional.svg"></object>
    </div>
    <div id="table-panel">
      <div id="tabla"></div>
    </div>
  </div>

  <script src="svg-controls.js"></script>
  <script>
    let table = null;
    let svgControl = null;
    let svgToRowId = new Map();

    function loadDataFromSVG() {
      const svgObject = document.getElementById('svg-object');
      svgObject.addEventListener('load', function() {
        const svgDoc = svgObject.contentDocument;
        if (!svgDoc) return;
        
        svgToRowId.clear();
        svgDoc.querySelectorAll('[href]').forEach(el => {
          const href = el.getAttribute('href');
          if (href && href.startsWith('#')) {
            const rowId = href.substring(1);
            if (el.id) svgToRowId.set(el.id, rowId);
          }
        });

        let factTable = null;
        for (let t of svgDoc.getElementsByTagName('v:table')) {
          if (t.getAttribute('visualization') === 'chart') { factTable = t; break; }
        }
        
        if (!factTable) return;

        const columnNames = factTable.getAttribute('columns').split(',').map(c => c.trim());
        const rows = factTable.getElementsByTagName('v:row');
        const data = [];
        for (let row of rows) {
          const rowId = row.getAttribute('id');
          const parts = row.textContent.trim().split(',');
          const record = {};
          columnNames.forEach((col, idx) => { record[col] = isNaN(parts[idx]) ? parts[idx] : parseFloat(parts[idx]); });
          record['_rowId'] = rowId;
          data.push(record);
        }

        table = new SimpleTable("tabla", { 
          data: data, 
          columns: columnNames.map(k => ({field: k, title: k})), 
          selectable: true,
          onRowSelect: (selectedRows) => {
            if (!svgControl) return;
            if (selectedRows.length === 1) {
              const rowId = selectedRows[0]._rowId;
              for (let [svgId, refRowId] of svgToRowId.entries()) {
                if (refRowId === rowId) { svgControl.select(svgId); break; }
              }
            } else if (selectedRows.length === 0) { svgControl.select(null); }
          }
        });

        const connectSVGControl = () => {
          if (svgObject.__SVGControl) {
            svgControl = svgObject.__SVGControl;
            svgControl.setCallback('select', (svgElement) => {
              if (!table) return;
              if (svgElement && svgToRowId.has(svgElement.id)) {
                const rowId = svgToRowId.get(svgElement.id);
                const targetRow = table.data.find(row => row._rowId === rowId);
                if (targetRow) {
                  table.selectedRows.clear();
                  table.selectedRows.add(targetRow);
                  table.render();
                }
              } else if (!svgElement) {
                table.selectedRows.clear();
                table.render();
              }
            });
          } else { setTimeout(connectSVGControl, 50); }
        };
        connectSVGControl();
      });
    }

    Split(["#svg-panel", "#table-panel"], { sizes: [50, 50], direction: "vertical", gutterSize: 6 });
    loadDataFromSVG();
  </script>
</body>
</html>
