<svg width="600" height="450" xmlns="http://www.w3.org/2000/svg" xmlns:v="https://odviz.org/1.0/">
  <metadata>
    <v:table visualization="chart" columns="id,activity,stress" primaryKey="id">
        <v:row id="row-0">0,42,6</v:row>
        <v:row id="row-1">1,60,8</v:row>
        <v:row id="row-2">2,60,8</v:row>
        <v:row id="row-3">3,30,8</v:row>
        <v:row id="row-4">4,75,6</v:row>
    </v:table>
  </metadata>

  <style>
    .gridline { stroke: #cccccc; stroke-width: 1; }
    .axis-label { font-family: sans-serif; font-size: 12px; fill: #333; }
    .title { font-family: sans-serif; font-size: 14px; font-weight: bold; }
  </style>

  <g transform="translate(60,40)">
    <rect x="0" y="0" width="500" height="350" fill="#EBEBEB" />
    <line class="gridline" x1="0" x2="500" y1="175" y2="175" />
    <line class="gridline" x1="250" x2="250" y1="0" y2="350" />
    
    <text class="title" x="250" y="-15" text-anchor="middle">Actividad vs Estrés</text>
    
    <circle id="c-0" href="#row-0" cx="100" cy="200" r="8" fill="#e74c3c" />
    <circle id="c-1" href="#row-1" cx="200" cy="100" r="8" fill="#e74c3c" />
    <circle id="c-2" href="#row-2" cx="200" cy="100" r="8" fill="#e74c3c" />
    <circle id="c-3" href="#row-3" cx="50" cy="100" r="8" fill="#e74c3c" />
    <circle id="c-4" href="#row-4" cx="300" cy="200" r="8" fill="#e74c3c" />
  </g>
</svg>
